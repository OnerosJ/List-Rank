<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <header>
        <h1>Lista de Tarefas</h1>
    </header>
    <div class="main">
        <h2>Login</h2>
    <form onsubmit="login()" class="register">
        <label for="nome">Nome</label>
        <input id="name" type="text" name="nome" placeholder="Digite seu nome">
        <label for="senha">Senha</label>
        <input id="password" type="password" name="senha" placeholder="Digite sua senha">
        <button type="submit">Entrar</button>
    </form>
    <a href="/register.html">Não possui uma conta ?</a>
    </div>
    <script src="login.js"></script>
</body>
</html>
